<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>裁判評分輸入端 - StarLord TKD</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --blue-color: #2563eb;
      --blue-hover: #1d4ed8;
      --red-color: #dc2626;
      --red-hover: #b91c1c;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      overflow: hidden;
      padding: 10px;
    }

    /* Setup view: select judge number */
    .setup-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      text-align: center;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: #60a5fa;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .judge-options {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 300px;
    }

    .btn-judge {
      background-color: var(--card-bg);
      border: 2px solid #334155;
      color: var(--text-main);
      padding: 20px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-judge:active {
      background-color: #334155;
      transform: scale(0.98);
    }

    /* Scoring Pad View */
    .scoring-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      flex-grow: 1;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid #334155;
      margin-bottom: 8px;
      height: 40px;
    }

    .judge-badge {
      background-color: #3b82f6;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 0.85rem;
    }

    .btn-change-role {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-decoration: underline;
      cursor: pointer;
    }

    .pad-container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      gap: 10px;
      height: calc(100% - 48px);
    }

    .score-row {
      display: flex;
      flex: 1;
      gap: 10px;
      position: relative;
    }

    .row-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 800;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .score-btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 2.2rem;
      font-weight: 900;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
      transition: transform 0.05s ease;
      touch-action: manipulation;
      position: relative;
    }

    .score-btn.blue {
      background-color: var(--blue-color);
    }
    .score-btn.blue:active {
      background-color: var(--blue-hover);
      transform: scale(0.96);
    }

    .score-btn.red {
      background-color: var(--red-color);
    }
    .score-btn.red:active {
      background-color: var(--red-hover);
      transform: scale(0.96);
    }

    .score-btn-sub {
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    .status-toast {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.85);
      color: #10b981;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      border: 1px solid #10b981;
      z-index: 100;
    }

    .status-toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- 1. Setup Screen -->
  <div id="screen-setup" class="setup-screen">
    <div class="title">跆拳道裁判評分系統</div>
    <div class="subtitle">請選擇您的裁判席位 (Role)</div>
    <div class="judge-options">
      <button class="btn-judge" onclick="selectJudge(1)">裁判一席 (Judge 1)</button>
      <button class="btn-judge" onclick="selectJudge(2)">裁判二席 (Judge 2)</button>
      <button class="btn-judge" onclick="selectJudge(3)">裁判三席 (Judge 3)</button>
    </div>
  </div>

  <!-- 2. Scoring Pad Screen -->
  <div id="screen-scoring" class="scoring-screen">
    <div class="header-bar">
      <div id="judge-title" class="judge-badge">裁判一 (J1)</div>
      <button class="btn-change-role" onclick="resetRole()">重選席位</button>
    </div>
    
    <div class="pad-container">
      <!-- Row 1: 1 Point (Punch) -->
      <div class="score-row">
        <div class="row-label">1分 (拳擊)</div>
        <button class="score-btn blue" onclick="sendScore('blue', 1)">
          +1
          <div class="score-btn-sub">藍方</div>
        </button>
        <button class="score-btn red" onclick="sendScore('red', 1)">
          +1
          <div class="score-btn-sub">紅方</div>
        </button>
      </div>

      <!-- Row 2: 2 Points (Body) -->
      <div class="score-row">
        <div class="row-label">2分 (中端)</div>
        <button class="score-btn blue" onclick="sendScore('blue', 2)">
          +2
          <div class="score-btn-sub">藍方</div>
        </button>
        <button class="score-btn red" onclick="sendScore('red', 2)">
          +2
          <div class="score-btn-sub">紅方</div>
        </button>
      </div>

      <!-- Row 3: 3 Points (Head) -->
      <div class="score-row">
        <div class="row-label">3分 (上端)</div>
        <button class="score-btn blue" onclick="sendScore('blue', 3)">
          +3
          <div class="score-btn-sub">藍方</div>
        </button>
        <button class="score-btn red" onclick="sendScore('red', 3)">
          +3
          <div class="score-btn-sub">紅方</div>
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="status-toast">✓ 已送出給分</div>

  <script>
    let currentJudge = null;

    // Load saved role if exists
    const savedJudge = localStorage.getItem("tkd_judge_role");
    if (savedJudge) {
      selectJudge(parseInt(savedJudge));
    }

    function selectJudge(num) {
      currentJudge = num;
      localStorage.setItem("tkd_judge_role", num);
      document.getElementById("screen-setup").style.display = "none";
      document.getElementById("screen-scoring").style.display = "flex";
      document.getElementById("judge-title").textContent = `裁判 ${num} 席 (J${num})`;
    }

    function resetRole() {
      localStorage.removeItem("tkd_judge_role");
      document.getElementById("screen-setup").style.display = "flex";
      document.getElementById("screen-scoring").style.display = "none";
    }

    function sendScore(color, points) {
      // Haptic feedback (Vibration)
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }

      // Send scoring HTTP request to server (with points query parameter)
      const url = `/api/press?judge=${currentJudge}&color=${color}&points=${points}`;
      fetch(url)
        .then(res => res.text())
        .then(data => {
          showToast(points, color);
        })
        .catch(err => {
          console.error("Score submit failed:", err);
        });
    }

    function showToast(points, color) {
      const toast = document.getElementById("toast");
      const colorText = color === "blue" ? "藍方" : "紅方";
      toast.textContent = `✓ 已送出 ${colorText} ${points} 分`;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 600);
    }
  </script>
</body>
</html>
